name: Task
description: A concrete unit of work (agent-assignable)
type: Task
body:
  - type: markdown
    attributes:
      value: "## Task Details"
  - type: textarea
    id: description
    attributes:
      label: What needs to be done
      description: |
        Be specific. Include file paths, method signatures, expected
        inputs/outputs, and any patterns to follow from existing code.
        The more detail here, the better an agent will perform.
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context & References
      description: |
        Related files, existing patterns to follow, API contracts,
        data models, or links to parent feature issue.
  - type: textarea
    id: done-criteria
    attributes:
      label: Definition of Done
      value: |
        - [ ] Implementation complete
        - [ ] Unit tests pass
        - [ ] No new build warnings
    validations:
      required: true
  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - API
        - Angular Web
        - MAUI Mobile
        - Shared/Infra
        - Database
