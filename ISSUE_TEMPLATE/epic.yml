name: Epic
description: A major theme or area of the application
type: Epic
body:
  - type: markdown
    attributes:
      value: "## Epic"
  - type: textarea
    id: vision
    attributes:
      label: Vision
      description: What is this epic about? What problem does it solve or what area does it cover?
    validations:
      required: true
  - type: textarea
    id: goals
    attributes:
      label: Goals
      description: What outcomes define success for this epic?
      value: |
        - [ ] Goal 1
        - [ ] Goal 2
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Scope & Boundaries
      description: |
        What's included? What's explicitly out of scope?
        List the Features you expect to create under this Epic.
  - type: dropdown
    id: target
    attributes:
      label: Target
      options:
        - MVP
        - Post-MVP
        - Future
