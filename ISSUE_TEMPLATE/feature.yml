name: Feature
description: A new feature or capability
type: Feature
body:
  - type: markdown
    attributes:
      value: "## Feature Description"
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What does this feature do? Who is it for?
    validations:
      required: true
  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Acceptance Criteria
      description: How do we know this feature is complete?
      value: |
        - [ ] Criteria 1
        - [ ] Criteria 2
    validations:
      required: true
  - type: textarea
    id: technical-notes
    attributes:
      label: Technical Notes
      description: Data models, API contracts, dependencies, or design decisions
  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - API
        - Angular Web
        - MAUI Mobile
        - Shared/Infra
        - Database
